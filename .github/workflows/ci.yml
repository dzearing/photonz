name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & test (arm64)
    runs-on: macos-26
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (all targets)
        run: swift build

      - name: Run tests
        timeout-minutes: 12
        # --no-parallel: swift-testing otherwise launches every test concurrently;
        # the GPU-bound render tests then saturate the cooperative thread pool on
        # the headless CI VM and the whole process wedges. Serial is ~seconds here.
        run: Scripts/test.sh --no-parallel

      - name: Build release app bundle
        run: Scripts/build-app.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Photonz.app
          path: dist/Photonz.app
          retention-days: 7
