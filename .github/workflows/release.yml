name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build, package & publish
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches VERSION
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE="$(cat VERSION)"
          if [[ "$TAG" != "$FILE" ]]; then
            echo "Tag v$TAG does not match VERSION file ($FILE)" >&2
            exit 1
          fi

      - name: Run tests
        run: Scripts/test.sh

      - name: Build app + DMG
        run: Scripts/build-app.sh --dmg

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="$(cat VERSION)"
          awk -v ver="$VERSION" '
            $0 ~ "^## " ver { found=1; next }
            /^## / && found { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [[ ! -s /tmp/release-notes.md ]]; then
            echo "No CHANGELOG section for $VERSION" > /tmp/release-notes.md
          fi
          cat /tmp/release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Photonz $GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md \
            dist/Photonz.dmg
