name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build, package & publish
    runs-on: macos-26
    # Generous: Apple's notary service is usually minutes but can crawl for
    # 30+ min during slow stretches; don't let the job cancel a good build.
    timeout-minutes: 75
    env:
      # True once the Apple Developer secrets are configured; every signing/
      # notarization step keys off this so the pipeline still works (ad-hoc)
      # without them. Required secrets:
      #   APPLE_SIGNING_IDENTITY      "Developer ID Application: Name (TEAMID)"
      #   APPLE_CERTIFICATE_P12       base64 of the .p12 (cert + private key)
      #   APPLE_CERTIFICATE_PASSWORD  password for the .p12
      #   APPLE_ID                    Apple ID email for notarytool
      #   APPLE_TEAM_ID               10-char team id
      #   APPLE_APP_PASSWORD          app-specific password for notarytool
      HAVE_SIGNING: ${{ secrets.APPLE_SIGNING_IDENTITY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches VERSION
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE="$(cat VERSION)"
          if [[ "$TAG" != "$FILE" ]]; then
            echo "Tag v$TAG does not match VERSION file ($FILE)" >&2
            exit 1
          fi

      - name: Run tests
        timeout-minutes: 12
        # --no-parallel: see ci.yml — serial avoids the headless-runner test hang.
        run: Scripts/test.sh --no-parallel

      - name: Import Developer ID certificate
        if: env.HAVE_SIGNING == 'true'
        env:
          CERT_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          rm "$RUNNER_TEMP/cert.p12"

      - name: Build app + DMG
        env:
          # Empty when unsigned: build-app.sh falls back to ad-hoc signing.
          CODESIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: Scripts/build-app.sh --dmg

      # Best-effort: the build is already Developer ID signed, which is what
      # matters. Notarization removes the first-launch Gatekeeper prompt, but
      # Apple's notary *ingestion* has been hanging at the upload stage (no
      # submission id, so notarytool's own --timeout — which only covers the
      # result wait — never fires). So we wrap submit in a shell `timeout` to
      # kill a stalled upload, retry a few times, and if it still won't go
      # through we PUBLISH THE SIGNED DMG ANYWAY and notarize on a later build.
      - name: Notarize & staple (best-effort)
        if: env.HAVE_SIGNING == 'true'
        continue-on-error: true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ok=0
          for attempt in 1 2 3; do
            echo "::group::Notarization attempt $attempt"
            # `timeout 720` hard-kills a stalled upload (notarytool --timeout
            # only bounds the post-upload wait); --timeout 10m bounds the wait.
            if timeout 720 xcrun notarytool submit dist/Photonz.dmg \
                 --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
                 --password "$APPLE_APP_PASSWORD" --wait --timeout 10m --verbose; then
              ok=1; echo "::endgroup::"; break
            fi
            echo "attempt $attempt did not complete (upload stall or timeout)"
            echo "::endgroup::"; sleep 20
          done
          if [ "$ok" = 1 ]; then
            xcrun stapler staple dist/Photonz.dmg
            xcrun stapler validate dist/Photonz.dmg
            echo "NOTARIZED=1" >> "$GITHUB_ENV"
          else
            echo "::warning::Notarization did not complete after retries; publishing the signed-but-unnotarized DMG. It will notarize on a future release once Apple's notary ingestion is healthy."
          fi

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="$(cat VERSION)"
          awk -v ver="$VERSION" '
            $0 ~ "^## " ver { found=1; next }
            /^## / && found { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [[ ! -s /tmp/release-notes.md ]]; then
            echo "No CHANGELOG section for $VERSION" > /tmp/release-notes.md
          fi
          cat /tmp/release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Photonz $GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md \
            dist/Photonz.dmg
